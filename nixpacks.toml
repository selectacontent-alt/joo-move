[phases.setup]
nixPkgs = ["...", "chromium", "unzip"]

[phases.build]
cmds = ["npm run build", "node scripts/prune-host-build.mjs"]

[start]
cmd = "npm run start"

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_PROTOCOL_TIMEOUT_MS = "300000"
WHATSAPP_SEND_TASK_TIMEOUT_MS = "90000"
WHATSAPP_CLIENT_ID = "al-rehab-client"
UPLOAD_DIR = "/data/uploads"
